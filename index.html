<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gino Xiscatti</title>
    <link rel="icon" href="Assets/FirmaOnlyG.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="ModuloInicio/modulo-inicio.css">
    <link rel="stylesheet" href="ModuloMiel/modulo-miel.css">
    <link rel="stylesheet" href="ModuloIlustra/modulo-ilustra.css">
    <link rel="stylesheet" href="ModuloDentalLab/modulo-dental-lab.css">
    <link rel="stylesheet" href="ModuloContacto/modulo-contacto.css">
    <style>
        /* Estilo crítico para asegurar que la carga inicie inmediatamente */
        .top-bar {
            height: 100vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #000;
            z-index: 10000;
            padding: 0 30px;
            box-shadow: 0 1px 0px rgb(0, 0, 0);
        }
        .macos-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* Espacio entre el logo y la barra */
            z-index: 10001;
        }
        .macos-logo {
            width: 80px; /* Tamaño del logo tipo Apple */
            height: auto;
            opacity: 0.9;
        }
        .macos-progress-container {
            width: 200px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .macos-progress {
            width: 0%;
            height: 100%;
            background: #fff;
            border-radius: 10px;
            /* Transición base: se sobrescribirá en JS según la velocidad necesaria */
            transition: width 0s;
        }
        body { overflow: hidden; }
    </style>
</head>
<body>
    <div id="mobile-barrier">
        <div class="barrier-content">
            <h1>PAGINA EN DESARROLLO</h1>
            <p>Lo sentimos, esta web no está disponible para dispositivos móviles en este momento.</p>
            <div class="barrier-icon">📱🚫</div>
        </div>
    </div>
    
    <div class="top-bar grain">
        <a href="#modulo-perfil" class="signature">
            <img src="Assets/Firma recortada.svg" alt="Gino Xiscatti" class="logo">
        </a>
        <div class="macos-loader">
             <img src="Assets/FirmaOnlyG.svg" alt="Logo" class="macos-logo">
             <div class="macos-progress-container">
                <div class="macos-progress"></div>
             </div>
         </div>
        <nav>
            <div class="nav-marker"></div>
            <ul>
                <li><a href="#modulo-perfil" class="active">Mi historia</a></li>
                <li class="nav-separator"></li>
                <li><a href="#modulo-ilustra">Ilustra</a></li>
                <li><a href="#modulo-dental-lab">Dental Lab</a></li>
                <li><a href="#modulo-miel">Miel</a></li>
                <li class="nav-separator"></li>
                <li><a href="#modulo-contacto">Contacto</a></li>
            </ul>
        </nav>
    </div>

    <main>
        <div id="modulo-perfil" class="content-block active"></div>
        <div id="modulo-ilustra" class="content-block"></div>
        <div id="modulo-dental-lab" class="content-block"></div>
        <div id="modulo-miel" class="content-block"></div>
        <div id="modulo-contacto" class="content-block"></div>
    </main>
    
    <script src="script.js"></script>
    <script src="ModuloInicio/modulo-inicio.js"></script>
    <script src="ModuloMiel/modulo-miel.js"></script>
    <script src="ModuloIlustra/modulo-ilustra.js"></script>
    <script src="ModuloDentalLab/modulo-dental-lab.js"></script>
    <script src="ModuloContacto/modulo-contacto.js"></script>
</body>
</html>
