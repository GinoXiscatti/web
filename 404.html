<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gino Xiscatti</title>
    <script type="text/javascript">
      // Script para manejar SPA en GitHub Pages
      var pathSegmentsToKeep = 1;

      var l = window.location;
      var path = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
      var p = '/' + l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/');
      
      // Aseguramos que no haya doble barra al principio de p
      p = p.replace(/\/+/g, '/');

      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        path + '/?p=' + p.replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
