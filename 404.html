<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gino Xiscatti</title>
    <script type="text/javascript">
      // Script para manejar SPA en GitHub Pages
      // Toma la URL que dio 404 y la guarda para que index.html la maneje
      var pathSegmentsToKeep = 1; // 'web' es el primer segmento en ginoxiscatti.github.io/web/

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
