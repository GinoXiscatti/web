<div id="modulo-ilustra" class="content-block">
    <aside class="ilustra-left">
        <div class="ilustra-light-effect"></div>
        <svg class="ilustra-nav-marker" viewBox="0 0 34.28 47.97">
            <path d="M3.92,17.27L34.28,0v47.97L3.58,30.48c-4.92-3.14-4.74-10.33.34-13.21Z" fill="#ffffff"/>
        </svg>
        <div class="ilustra-nav-group">
            <button class="ilustra-nav-item active" data-target="que-es">¿Que es Ilustra?</button>
            <button class="ilustra-nav-item" data-target="portafolio">Portafolio</button>
            <button class="ilustra-nav-item" data-target="precios">Precios</button>

        <p class="ilustra-controls-text">¡Dale tu toque!</p>

            <button class="ilustra-btn-square">A</button>
            <div class="ilustra-hue-container">

        </div>
    </aside>
    <main class="ilustra-right">
        <div class="ilustra-fixed-logo grain">

        <div id="portafolio" class="ilustra-panel">
            <h2>Portafolio</h2>
            <p>Explora nuestra selección de trabajos y proyectos artísticos.</p>
        </div>
        <div id="precios" class="ilustra-panel">
            <h2>Precios</h2>
            <p>Descubre los servicios de ilustración y diseño que ofrecemos.</p>
        </div>
    </main>
</div>
